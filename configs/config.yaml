data:
  keypoints_dir:
    train: "data/keypoints/train_2D_keypoints/openpose_output/json"
    val:   "data/keypoints/val_2D_keypoints/openpose_output/json"
    test:  "data/keypoints/test_2D_keypoints/openpose_output/json"

  translations_dir:
    train: "data/translations/how2sign_realigned_train.csv"
    val:   "data/translations/how2sign_realigned_val.csv"
    test:  "data/translations/how2sign_realigned_test.csv"

  processed_dir: "data/processed"
  vocab_path: "data/vocab.json"
  vocab_min_freq: 1
  max_sentence_words: 10
  max_frames: 150
  feature_dim: 274

model:
  # MotionBERT encoder output is projected to decoder_hidden_dim
  # input_dim is ignored (MotionBERT handles its own input)
  input_dim: 274

  # Decoder
  decoder_hidden_dim: 256
  decoder_layers: 2
  decoder_dropout: 0.25

  # MotionBERT freeze schedule:
  # Epochs 0..freeze_epochs-1: backbone frozen, only decoder trains
  # Epoch freeze_epochs onwards: full fine-tuning
  freeze_epochs: 10

  vocab_size: 6488
  max_output_length: 30

training:
  batch_size: 32
  learning_rate: 0.0001   # higher lr ok — backbone starts frozen
  epochs: 150
  clip_grad_norm: 1.0
  early_stopping_patience: 20
  label_smoothing: 0.1
  seed: 42