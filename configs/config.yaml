data:
  raw_video_dir: "data/raw"
  keypoints_dir: "data/keypoints"
  splits_dir: "data/splits"
  wlasl_json: "data/WLASL_v0.3.json" # oficial WLASL json
  num_classes: 100 # WLASL100
  max_frames: 64                        

keypoints:
  use_hands: true
  use_pose: true
  use_face: false                       
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

# Final dimentions:
# Pose: 33 keypoints x 4 (x, y, z, visibility)
# Left hand: 21 x 3, Right hand: 21 x 3
# Total by frame: 33*4 + 21*3 + 21*3 = 132 + 63 + 63 = 258 features