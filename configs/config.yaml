data:
  keypoints_dir:
    train: "data/keypoints/train_2D_keypoints/openpose_output/json"
    val:   "data/keypoints/val_2D_keypoints/openpose_output/json"
    test:  "data/keypoints/test_2D_keypoints/openpose_output/json"

  translations_dir:
    train: "data/translations/how2sign_realigned_train.csv"
    val:   "data/translations/how2sign_realigned_val.csv"
    test:  "data/translations/how2sign_realigned_test.csv"

  processed_dir: "data/processed"
  vocab_path: "data/vocab.json"
  vocab_min_freq: 1
  max_sentence_words: 30
  max_frames: 150
  feature_dim: 274

model:
  decoder_hidden_dim: 256
  decoder_layers: 4        # Upgraded from 2 to avoid text translation bottleneck
  decoder_dropout: 0.3     # Higher regularization
  freeze_epochs: 5         # Reduced from 10 to learn spatial details sooner
  max_output_length: 30    # Must match training dataset token lengths

training:
  seed: 42
  learning_rate: 0.0003    # Slightly higher to provide strong gradients to decoder
  label_smoothing: 0.15    # Prevent early overconfidence
  batch_size: 32
  epochs: 40
  early_stopping_patience: 8